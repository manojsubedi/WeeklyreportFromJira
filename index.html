<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GME BIZ — Version Selector</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#0D1B4E;min-height:100vh;display:flex;flex-direction:column;}
#switcher{background:#0D1B4E;border-bottom:2px solid rgba(255,255,255,.08);padding:0 20px;display:flex;align-items:center;gap:14px;height:66px;flex-shrink:0;position:sticky;top:0;z-index:999;}
.sw-logo{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;color:#fff;white-space:nowrap;display:flex;align-items:center;gap:8px;}
.sw-logo-badge{background:#2563EB;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;}
.sw-divider{width:1px;height:34px;background:rgba(255,255,255,.12);flex-shrink:0;}
.sw-label{font-size:10.5px;color:rgba(255,255,255,.45);white-space:nowrap;font-weight:500;letter-spacing:.3px;}
.sw-btns{display:flex;gap:8px;}
.vbtn{display:flex;flex-direction:column;padding:7px 14px;border-radius:10px;cursor:pointer;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;transition:all .18s;min-width:170px;}
.vbtn:hover{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.09);}
.vbtn.active{border-color:#2563EB;background:rgba(37,99,235,.22);}
.vbtn-top{font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:5px;}
.vbtn-desc{font-size:9.5px;color:rgba(255,255,255,.5);margin-top:2px;line-height:1.4;}
.vbtn.active .vbtn-desc{color:rgba(255,255,255,.72);}
.vbadge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:7px;background:rgba(255,255,255,.14);color:rgba(255,255,255,.75);}
.vbtn.active .vbadge{background:#2563EB;color:#fff;}
.vnew{font-size:8px;font-weight:800;padding:1px 5px;border-radius:5px;background:#059669;color:#fff;letter-spacing:.4px;}
.sw-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sw-status{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;}
.sw-compare{font-size:11px;padding:5px 12px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);cursor:pointer;white-space:nowrap;transition:.15s;}
.sw-compare:hover{background:rgba(255,255,255,.13);color:#fff;}
#loader{position:fixed;inset:0;background:rgba(13,27,78,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loader.hidden{display:none;}
.loader-ring{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:#2563EB;border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-label{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.65);}
#frame{flex:1;border:none;width:100%;display:block;min-height:0;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E293B;border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:10px;padding:10px 18px;font-size:12px;display:flex;align-items:center;gap:10px;z-index:9998;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.4);}
#toast.show{transform:translateX(-50%) translateY(0);}
.toast-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#2563EB;color:#fff;white-space:nowrap;}
.toast-text{color:rgba(255,255,255,.75);line-height:1.4;max-width:520px;}
</style>
</head>

    changes:'+ Full sidebar layout · 50+ dynamic status colors · Per-project aggregate gantt · Week-aware completion colors · EpicAsTask mode — all 73 items · Latin-1 encoding fallback'}
};
let current=null,toastTimer=null;

function b64ToBlob(b64){
  const bin=atob(b64),buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  return new Blob([buf],{type:'text/html;charset=latin-1'});
}

function showToast(tag,text){
  clearTimeout(toastTimer);
  document.getElementById('toastTag').textContent=tag;
  document.getElementById('toastText').textContent=text;
  document.getElementById('toast').classList.add('show');
  toastTimer=setTimeout(()=>document.getElementById('toast').classList.remove('show'),6000);
}

function loadVersion(ver){
  if(current===ver)return;
  current=ver;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+ver).classList.add('active');
  const v=VERSIONS[ver];
  document.getElementById('loaderLabel').textContent='Loading '+v.label+'…';
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('swStatus').textContent='⏳ Loading…';
  setTimeout(()=>{
    const blob=b64ToBlob(v.data);
    const url=URL.createObjectURL(blob);
    const frame=document.getElementById('frame');
    if(frame._url)URL.revokeObjectURL(frame._url);
    frame._url=url;
    frame.onload=()=>{
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('swStatus').textContent='✅ '+v.label;
      showToast(v.tag,v.changes);
    };
    frame.src=url;
  },60);
}
window.addEventListener('DOMContentLoaded',()=>loadVersion('v7'));
</script>
